<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¿Conoces a Montse Grases?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="app-topbar">
        <span id="language-label">Idioma</span>
        <div class="language-switch" role="radiogroup" aria-labelledby="language-label">
          <label class="language-option" for="language-es">
            <input id="language-es" type="radio" name="page-language" value="es" checked />
            <span class="language-flag" aria-hidden="true">🇪🇸</span>
            <span class="language-name">Castellano</span>
          </label>
          <label class="language-option" for="language-ca">
            <input id="language-ca" type="radio" name="page-language" value="ca" />
            <span class="language-flag" aria-hidden="true">🏴</span>
            <span class="language-name">Català</span>
          </label>
        </div>
      </div>

      <section id="start-screen" class="screen active">
        <h1 id="app-title">¿Conoces a Montse Grases?</h1>
        <figure class="hero-shot">
          <img
            src="https://live.staticflickr.com/7720/17113918330_64a8463504_b.jpg"
            alt="Fotografía de Montserrat Grases"
            loading="lazy"
          />
          <figcaption id="hero-caption">Imagen del álbum "Montse Grases, una chica como las demás" (Flickr Opus Dei)</figcaption>
        </figure>
        <p id="lead-text" class="lead">
          Repasa la vida de Montserrat Grases con preguntas rápidas y puntos por velocidad.
        </p>
        <form id="start-form" class="start-form">
          <button id="start-btn-label" type="submit" class="btn btn-primary">Comenzar</button>
        </form>
        <p id="load-status" class="load-status" aria-live="polite"></p>
        <div class="admin-entry">
          <button id="admin-toggle-btn" type="button" class="btn btn-secondary">Acceso administrador</button>
          <p id="admin-status" class="admin-status" aria-live="polite"></p>
        </div>

        <section id="asset-panel" class="asset-panel" aria-labelledby="asset-panel-title" hidden>
          <div class="asset-panel-head">
            <div>
              <p id="editor-eyebrow" class="eyebrow">Personalización local</p>
              <h2 id="asset-panel-title">Editor de preguntas</h2>
            </div>
            <button id="export-questions-btn" type="button" class="btn btn-secondary">Exportar JSON</button>
          </div>

          <div class="editor-toolbar">
            <label id="existing-question-label" for="image-question-select">Editar pregunta existente</label>
            <select id="image-question-select">
              <option value="">Nueva pregunta</option>
            </select>

            <div class="image-actions image-actions-single">
              <button id="new-question-btn" type="button" class="btn btn-secondary">Nueva pregunta</button>
            </div>
          </div>

          <form id="image-form" class="image-form">
            <div class="editor-grid">
              <section class="editor-column">
                <h3 id="editor-es-title">Castellano</h3>

                <label id="question-es-label" for="question-text-es">Pregunta</label>
                <input id="question-text-es" maxlength="180" placeholder="Escribe el enunciado" required />

                <label id="option-es-1-label" for="option-es-1">Opción 1</label>
                <input id="option-es-1" class="option-input-es" maxlength="120" required />

                <label id="option-es-2-label" for="option-es-2">Opción 2</label>
                <input id="option-es-2" class="option-input-es" maxlength="120" required />

                <label id="option-es-3-label" for="option-es-3">Opción 3</label>
                <input id="option-es-3" class="option-input-es" maxlength="120" required />

                <label id="option-es-4-label" for="option-es-4">Opción 4</label>
                <input id="option-es-4" class="option-input-es" maxlength="120" required />

                <label id="caption-es-label" for="image-caption-es">Pie de foto</label>
                <input id="image-caption-es" maxlength="120" placeholder="Describe la imagen que quieres mostrar" />
              </section>

              <section class="editor-column">
                <h3 id="editor-ca-title">Català</h3>

                <label id="question-ca-label" for="question-text-ca">Pregunta</label>
                <input id="question-text-ca" maxlength="180" placeholder="Escriu l'enunciat" required />

                <label id="option-ca-1-label" for="option-ca-1">Opció 1</label>
                <input id="option-ca-1" class="option-input-ca" maxlength="120" required />

                <label id="option-ca-2-label" for="option-ca-2">Opció 2</label>
                <input id="option-ca-2" class="option-input-ca" maxlength="120" required />

                <label id="option-ca-3-label" for="option-ca-3">Opció 3</label>
                <input id="option-ca-3" class="option-input-ca" maxlength="120" required />

                <label id="option-ca-4-label" for="option-ca-4">Opció 4</label>
                <input id="option-ca-4" class="option-input-ca" maxlength="120" required />

                <label id="caption-ca-label" for="image-caption-ca">Peu de foto</label>
                <input id="image-caption-ca" maxlength="120" placeholder="Descriu la imatge que vols mostrar" />
              </section>
            </div>

            <label id="answer-label" for="answer-select">Respuesta correcta</label>
            <select id="answer-select" required>
              <option value="">Selecciona la correcta</option>
              <option value="0">Opción 1</option>
              <option value="1">Opción 2</option>
              <option value="2">Opción 3</option>
              <option value="3">Opción 4</option>
            </select>

            <label id="image-file-label" for="image-file-input">Archivo de imagen</label>
            <input id="image-file-input" name="imageFile" type="file" accept="image/*" />

            <div class="image-actions">
              <button id="save-question-btn" type="submit" class="btn btn-primary">Guardar pregunta</button>
              <button id="clear-image-btn" type="button" class="btn btn-secondary">Quitar imagen</button>
              <button id="delete-question-btn" type="button" class="btn btn-secondary">Eliminar pregunta</button>
            </div>
          </form>

          <figure class="custom-preview" id="custom-preview" hidden>
            <img id="custom-preview-image" src="" alt="Vista previa de la imagen subida" />
            <figcaption id="custom-preview-caption"></figcaption>
          </figure>

          <p id="image-form-status" class="load-status" aria-live="polite"></p>
        </section>

        <p class="source-note">
          <span id="source-prefix">Fuente principal:</span>
          <a href="https://opusdei.org/es-es/montse-grases/" target="_blank" rel="noreferrer">opusdei.org/es-es/montse-grases</a>
        </p>
      </section>

      <section id="quiz-screen" class="screen">
        <header class="hud">
          <div>
            <p id="hud-score-label" class="hud-label">Puntos</p>
            <p id="hud-score" class="hud-value">0</p>
          </div>
          <div>
            <p id="hud-timer-label" class="hud-label">Tiempo</p>
            <p id="hud-timer" class="hud-value">20</p>
          </div>
        </header>

        <div class="question-meta">
          <p id="question-count">Pregunta 1 / 10</p>
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <h2 id="question-text" class="question-text"></h2>
        <figure class="question-shot">
          <img id="question-image" src="" alt="Imagen de Montse Grases" loading="lazy" />
          <figcaption id="question-image-caption"></figcaption>
        </figure>
        <div id="answers" class="answers-grid"></div>

        <p id="round-feedback" class="round-feedback" aria-live="polite"></p>
        <div class="quiz-actions">
          <button id="back-to-start-btn" class="btn btn-secondary" type="button">Volver al inicio</button>
          <button id="next-btn" class="btn btn-secondary" type="button" hidden>Siguiente</button>
        </div>
      </section>

      <section id="result-screen" class="screen">
        <p id="result-eyebrow" class="eyebrow">Fin del juego</p>
        <h2 id="result-title">Gran repaso</h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-completion-count" class="completion-count"></p>

        <button id="restart-btn" class="btn btn-primary">Jugar otra vez</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
