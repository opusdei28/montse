<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¿Conoces a Montse Grases?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="start-screen" class="screen active">
        <h1>¿Conoces a Montse Grases?</h1>
        <figure class="hero-shot">
          <img
            src="https://live.staticflickr.com/7720/17113918330_64a8463504_b.jpg"
            alt="Fotografia de Montserrat Grases"
            loading="lazy"
          />
          <figcaption>Imagen del album "Montse Grases, una chica como las demas" (Flickr Opus Dei)</figcaption>
        </figure>
        <p class="lead">
          Repasa la vida de Montserrat Grases con preguntas rapidas y puntos por velocidad.
        </p>
        <form id="start-form" class="start-form">
          <button type="submit" class="btn btn-primary">Comenzar</button>
        </form>
        <p id="load-status" class="load-status" aria-live="polite"></p>
        <p id="completion-count" class="completion-count" aria-live="polite"></p>

        <div class="admin-entry">
          <button id="admin-toggle-btn" type="button" class="btn btn-secondary">Acceso administrador</button>
          <p id="admin-status" class="admin-status" aria-live="polite"></p>
        </div>

        <section id="asset-panel" class="asset-panel" aria-labelledby="asset-panel-title" hidden>
          <div class="asset-panel-head">
            <div>
              <p class="eyebrow">Personalizacion local</p>
              <h2 id="asset-panel-title">Editor de preguntas</h2>
            </div>
            <button id="export-questions-btn" type="button" class="btn btn-secondary">Exportar JSON</button>
          </div>

          <div class="editor-toolbar">
            <label for="image-question-select">Editar pregunta existente</label>
            <select id="image-question-select">
              <option value="">Nueva pregunta</option>
            </select>

            <div class="image-actions">
              <button id="new-question-btn" type="button" class="btn btn-secondary">Nueva pregunta</button>
            </div>

            <label for="import-questions-input">Importar `questions.json`</label>
            <input id="import-questions-input" type="file" accept="application/json,.json" />
          </div>

          <form id="image-form" class="image-form">
            <label for="question-text-input">Pregunta</label>
            <input id="question-text-input" name="questionText" maxlength="180" placeholder="Escribe el enunciado" required />

            <label for="option-1-input">Opcion 1</label>
            <input id="option-1-input" class="option-input" maxlength="120" required />

            <label for="option-2-input">Opcion 2</label>
            <input id="option-2-input" class="option-input" maxlength="120" required />

            <label for="option-3-input">Opcion 3</label>
            <input id="option-3-input" class="option-input" maxlength="120" required />

            <label for="option-4-input">Opcion 4</label>
            <input id="option-4-input" class="option-input" maxlength="120" required />

            <label for="answer-select">Respuesta correcta</label>
            <select id="answer-select" required>
              <option value="">Selecciona la correcta</option>
              <option value="0">Opcion 1</option>
              <option value="1">Opcion 2</option>
              <option value="2">Opcion 3</option>
              <option value="3">Opcion 4</option>
            </select>

            <label for="image-caption-input">Pie de foto</label>
            <input
              id="image-caption-input"
              name="imageCaption"
              maxlength="120"
              placeholder="Describe la imagen que quieres mostrar"
            />

            <label for="image-file-input">Archivo de imagen</label>
            <input id="image-file-input" name="imageFile" type="file" accept="image/*" />

            <div class="image-actions">
              <button type="submit" class="btn btn-primary">Guardar pregunta</button>
              <button id="clear-image-btn" type="button" class="btn btn-secondary">Quitar imagen</button>
              <button id="delete-question-btn" type="button" class="btn btn-secondary">Eliminar pregunta</button>
            </div>
          </form>

          <figure class="custom-preview" id="custom-preview" hidden>
            <img id="custom-preview-image" src="" alt="Vista previa de la imagen subida" />
            <figcaption id="custom-preview-caption"></figcaption>
          </figure>

          <p id="image-form-status" class="load-status" aria-live="polite"></p>
        </section>

        <p class="source-note">
          Fuente principal:
          <a href="https://opusdei.org/es-es/montse-grases/" target="_blank" rel="noreferrer">opusdei.org/es-es/montse-grases</a>
        </p>
      </section>

      <section id="quiz-screen" class="screen">
        <header class="hud">
          <div>
            <p class="hud-label">Puntos</p>
            <p id="hud-score" class="hud-value">0</p>
          </div>
          <div>
            <p class="hud-label">Tiempo</p>
            <p id="hud-timer" class="hud-value">20</p>
          </div>
        </header>

        <div class="question-meta">
          <p id="question-count">Pregunta 1 / 10</p>
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <h2 id="question-text" class="question-text"></h2>
        <figure class="question-shot">
          <img id="question-image" src="" alt="Imagen de Montse Grases" loading="lazy" />
          <figcaption id="question-image-caption">Imagen de referencia de opusdei.org</figcaption>
        </figure>
        <div id="answers" class="answers-grid"></div>

        <p id="round-feedback" class="round-feedback" aria-live="polite"></p>
        <button id="next-btn" class="btn btn-secondary" hidden>Siguiente</button>
      </section>

      <section id="result-screen" class="screen">
        <p class="eyebrow">Fin del juego</p>
        <h2 id="result-title">Gran repaso</h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-completion-count" class="completion-count"></p>

        <button id="restart-btn" class="btn btn-primary">Jugar otra vez</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
